# Flood LoRA Experiment Configuration
# Phase 5C - LoRA benchmark

experiment_name: lora
task: flood

# Model configuration
model:
  adapter_type: lora
  feature_dim: 768
  lora_rank: 16
  lora_alpha: 32
  freeze_backbone: true

# Training configuration
training:
  epochs: 10
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  optimizer: adam

# Data configuration
data:
  num_samples: 100
  image_size: 256
  num_classes: 2

# Output configuration
output:
  output_dir: results/lora
  save_checkpoints: true
  checkpoint_interval: 5
  save_best: true

# Device configuration
device: cuda